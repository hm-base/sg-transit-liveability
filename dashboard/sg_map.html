<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Transit Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- Leaflet Heatmap plugin -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0e1117;
    color: #fafafa;
  }

  #map {
    width: 100%;
    /* Fill whatever viewport this page gets — the full window when served
       standalone by FastAPI, or the iframe height Streamlit embeds it at. */
    height: 100vh;
    border-radius: 8px;
    z-index: 1;
  }

  /* Popup card styles */
  .leaflet-popup-content-wrapper {
    background: #1a1d27;
    border: 1px solid #2d3748;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: #fafafa;
    min-width: 280px;
  }

  .leaflet-popup-tip {
    background: #1a1d27;
  }

  .popup-card {
    padding: 4px;
  }

  .popup-header {
    font-size: 14px;
    font-weight: 700;
    color: #63b3ed;
    margin-bottom: 4px;
  }

  .popup-postal {
    font-size: 11px;
    color: #718096;
    margin-bottom: 10px;
  }

  .popup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .popup-metric {
    background: #2d3748;
    border-radius: 8px;
    padding: 8px;
  }

  .popup-metric-label {
    font-size: 10px;
    color: #a0aec0;
    margin-bottom: 2px;
  }

  .popup-metric-value {
    font-size: 16px;
    font-weight: 700;
    color: #fafafa;
  }

  .popup-metric-sub {
    font-size: 10px;
    color: #68d391;
    margin-top: 2px;
  }

  .popup-score {
    background: linear-gradient(135deg, #2b6cb0, #2c7a7b);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    margin-bottom: 8px;
  }

  .popup-score-value {
    font-size: 28px;
    font-weight: 800;
    color: #fafafa;
  }

  .popup-score-label {
    font-size: 11px;
    color: #bee3f8;
  }

  .popup-buses {
    background: #2d3748;
    border-radius: 8px;
    padding: 8px;
    max-height: 120px;
    overflow-y: auto;
  }

  .popup-bus-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid #4a5568;
    font-size: 12px;
  }

  .popup-bus-row:last-child { border-bottom: none; }

  .bus-badge {
    background: #2b6cb0;
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 11px;
    min-width: 32px;
    text-align: center;
  }

  .bus-time { color: #fbd38d; font-weight: 600; }
  .bus-load { color: #a0aec0; font-size: 10px; }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 20px;
    right: 10px;
    z-index: 1000;
    background: rgba(26, 29, 39, 0.95);
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    min-width: 130px;
  }

  .legend-title {
    font-weight: 700;
    color: #63b3ed;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    color: #e2e8f0;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-line {
    width: 20px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* District label — box-free text with a white halo so full names stay
     readable on any tile background without clipped dark boxes. */
  .district-label {
    background: none;
    border: none;
    padding: 0;
    color: #1A365D;
    font-size: 10.5px;
    font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 6px #fff, 0 1px 2px rgba(255,255,255,.95);
    pointer-events: none;
  }

  .mapctl-btn {
    background: rgba(26,29,39,0.95);
    border: 1px solid #2d3748;
    border-radius: 8px;
    color: #fafafa;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .mapctl-btn:hover { border-color: #63b3ed; color: #63b3ed; }

  /* Loading overlay */
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2000;
    background: rgba(14,17,23,0.85);
    padding: 16px 24px;
    border-radius: 10px;
    color: #63b3ed;
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>

<div style="position:relative;">
  <div id="map"></div>
  <div id="loading">⏳ Loading transport data...</div>
  <div id="postal-search-box" style="position:absolute; top:10px; left:50px; z-index:1000;
       background:rgba(26,29,39,0.95); border:1px solid #2d3748; border-radius:8px; padding:8px;
       display:flex; gap:6px;">
    <input id="postal-input" type="text" placeholder="Search postal code…" maxlength="6"
      style="background:#0e1117; border:1px solid #2d3748; border-radius:6px; color:#fafafa;
             padding:6px 10px; font-size:13px; width:150px;">
    <button id="postal-search-btn"
      style="background:#2b6cb0; color:white; border:none; border-radius:6px; padding:6px 14px;
             font-size:13px; font-weight:600; cursor:pointer;">Search</button>
  </div>
  <div id="map-ctl" style="position:absolute; top:10px; right:10px; z-index:1000;
       display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
    <button id="btn-expand" class="mapctl-btn" title="Grow the map to 80% of the window — scroll down to collapse it back">⤢ Expand map</button>
    <button id="btn-recenter" class="mapctl-btn" title="Reset to the default Singapore view">⌖ Recenter</button>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
// Use whatever origin this page was actually loaded from when served by
// FastAPI directly. Inside Streamlit's components.html the page lives in a
// srcdoc iframe whose origin is the literal string "null" — fall back to
// the FastAPI server there (its CORS middleware allows this).
const API_BASE   = window.location.origin.startsWith("http")
  ? window.location.origin
  : "http://127.0.0.1:8000";
// When embedded by Streamlit, the host inlines planning_areas.geojson here so
// district borders render even with the pipeline offline. Served standalone,
// this stays null and the loader falls back to fetching it from the API.
let INLINE_GEOJSON = null; /*__INLINE_GEOJSON__*/
const ONEMAP_URL = "https://www.onemap.gov.sg/api/common/elastic/search";

// MRT line colors
const MRT_COLORS = {
  EWL: "#009645",
  NSL: "#D42E12",
  NEL: "#9900AA",
  CCL: "#FA9E0D",
  DTL: "#005EC4",
  TEL: "#9D5B25",
};

// MRT stations
const MRT_STATIONS = [
  // EWL
  {name:"Jurong East",    lat:1.3330,lng:103.7421,line:"EWL"},
  {name:"Clementi",       lat:1.3152,lng:103.7651,line:"EWL"},
  {name:"Buona Vista",    lat:1.3072,lng:103.7900,line:"EWL"},
  {name:"Queenstown",     lat:1.2942,lng:103.8059,line:"EWL"},
  {name:"City Hall",      lat:1.2931,lng:103.8520,line:"EWL"},
  {name:"Tampines",       lat:1.3540,lng:103.9454,line:"EWL"},
  {name:"Pasir Ris",      lat:1.3731,lng:103.9494,line:"EWL"},
  // NSL
  {name:"Woodlands",      lat:1.4370,lng:103.7866,line:"NSL"},
  {name:"Yishun",         lat:1.4296,lng:103.8350,line:"NSL"},
  {name:"Ang Mo Kio",     lat:1.3699,lng:103.8495,line:"NSL"},
  {name:"Bishan",         lat:1.3510,lng:103.8480,line:"NSL"},
  {name:"Toa Payoh",      lat:1.3323,lng:103.8474,line:"NSL"},
  {name:"Orchard",        lat:1.3047,lng:103.8318,line:"NSL"},
  {name:"Raffles Place",  lat:1.2830,lng:103.8513,line:"NSL"},
  // NEL
  {name:"HarbourFront",   lat:1.2653,lng:103.8209,line:"NEL"},
  {name:"Chinatown",      lat:1.2844,lng:103.8444,line:"NEL"},
  {name:"Little India",   lat:1.3066,lng:103.8493,line:"NEL"},
  {name:"Serangoon",      lat:1.3499,lng:103.8731,line:"NEL"},
  {name:"Hougang",        lat:1.3713,lng:103.8921,line:"NEL"},
  {name:"Punggol",        lat:1.4053,lng:103.9022,line:"NEL"},
  // CCL
  {name:"Dhoby Ghaut",    lat:1.2990,lng:103.8456,line:"CCL"},
  {name:"Paya Lebar",     lat:1.3180,lng:103.8922,line:"CCL"},
  {name:"one-north",      lat:1.2993,lng:103.7873,line:"CCL"},
  // DTL
  {name:"Bukit Panjang",  lat:1.3784,lng:103.7761,line:"DTL"},
  {name:"Botanic Gardens",lat:1.3225,lng:103.8154,line:"DTL"},
  {name:"Newton",         lat:1.3124,lng:103.8380,line:"DTL"},
  {name:"Expo",           lat:1.3354,lng:103.9613,line:"DTL"},
  // TEL
  {name:"Woodlands North",lat:1.4480,lng:103.8002,line:"TEL"},
  {name:"Stevens",        lat:1.3198,lng:103.8258,line:"TEL"},
  {name:"Great World",    lat:1.2937,lng:103.8227,line:"TEL"},
  {name:"Marine Parade",  lat:1.3022,lng:103.9065,line:"TEL"},
  {name:"Bedok South",    lat:1.3215,lng:103.9401,line:"TEL"},
];

// District bboxes — populated for real from /districts on load (55 real
// planning areas), not the 3 hardcoded placeholders this used to have.
let DISTRICTS = {};
let DISTRICT_SCORES = {};  // name -> {score, verdict} from /rank, for color-coding

// ── Map init ───────────────────────────────────────────────────────────────
const HOME_VIEW = { center: [1.3521, 103.8198], zoom: 12 };
const map = L.map("map", {
  center: HOME_VIEW.center,
  zoom: HOME_VIEW.zoom,
  zoomControl: true,
});

// Embedded inside Streamlit? (srcdoc iframes share the parent's origin, so
// frameElement/top access works; standalone serving has no frame.)
const EMBEDDED = (() => {
  try { return window.frameElement !== null; } catch (e) { return false; }
})();

// ── Host-page integration: expand/collapse + recenter + click-to-select ────
let mapExpanded = false, baseHeight = null, expandScrollY = 0;

function setFrameHeight(px) {
  const fe = window.frameElement;
  if (!fe) return false;
  fe.style.height = px + "px";
  fe.setAttribute("height", px);
  // Streamlit pins the iframe's wrapper elements to the original height, so
  // the grown iframe would just paint over the content below — relax the
  // ancestors so the page reflows instead.
  let el = fe.parentElement, hops = 0;
  while (el && hops < 5 && !(el.dataset && el.dataset.testid === "stVerticalBlock")) {
    if (el.style) { el.style.height = "auto"; el.style.minHeight = "0"; }
    el = el.parentElement;
    hops++;
  }
  setTimeout(() => map.invalidateSize(), 80);
  return true;
}

function collapseMap() {
  try {
    if (mapExpanded && baseHeight) setFrameHeight(baseHeight);
  } catch (e) { /* host access lost — nothing to restore */ }
  mapExpanded = false;
  const b = document.getElementById("btn-expand");
  if (b) b.textContent = "⤢ Expand map";
}

function toggleExpand() {
  try {
    const fe = window.frameElement;
    if (!fe) return;
    if (mapExpanded) { collapseMap(); return; }
    if (baseHeight === null) baseHeight = Math.round(fe.getBoundingClientRect().height);
    const target = Math.round((window.top.innerHeight || 800) * 0.8);
    if (setFrameHeight(target)) {
      mapExpanded = true;
      expandScrollY = window.top.scrollY || 0;
      document.getElementById("btn-expand").textContent = "⤡ Collapse map";
    }
  } catch (e) { console.warn("Expand unavailable in this embed:", e); }
}

// Scrolling down past the expanded map returns it to its normal size.
try {
  window.top.addEventListener("scroll", () => {
    if (mapExpanded && (window.top.scrollY || 0) > expandScrollY + 150) collapseMap();
  }, { passive: true });
} catch (e) { /* standalone or sandboxed — no auto-collapse */ }

document.getElementById("btn-recenter").addEventListener("click",
  () => map.setView(HOME_VIEW.center, HOME_VIEW.zoom));
const _expandBtn = document.getElementById("btn-expand");
if (EMBEDDED) _expandBtn.addEventListener("click", toggleExpand);
else _expandBtn.style.display = "none";

// Clicking a district selects it in the host dashboard (URL param → the
// Streamlit page reloads with that district active). Standalone keeps the
// old live-score popup instead.
function selectDistrictInHost(rawName) {
  const slug = String(rawName).toLowerCase().replace(/\//g, "_").replace(/ /g, "_");
  try {
    const url = new URL(window.top.location.href);
    url.searchParams.set("district", slug);
    window.top.location.href = url.toString();
    return true;
  } catch (e) {
    console.warn("Could not update host URL:", e);
    return false;
  }
}

// OneMap tiles (Singapore official basemap)
L.tileLayer(
  "https://www.onemap.gov.sg/maps/tiles/Default/{z}/{x}/{y}.png",
  {
    attribution: "OneMap &copy; SLA",
    maxZoom: 18,
    minZoom: 10,
  }
).addTo(map);

// ── MRT stations ───────────────────────────────────────────────────────────
MRT_STATIONS.forEach(station => {
  const color = MRT_COLORS[station.line] || "#888";
  const icon  = L.divIcon({
    html: `<div style="
      width:10px;height:10px;
      background:${color};
      border:2px solid white;
      border-radius:50%;
      box-shadow:0 1px 4px rgba(0,0,0,0.5);
    "></div>`,
    className: "",
    iconSize: [10, 10],
    iconAnchor: [5, 5],
  });
  L.marker([station.lat, station.lng], {icon})
   .bindTooltip(`${station.name} (${station.line})`, {
     className: "district-label",
     direction: "top",
     offset: [0, -8],
   })
   .addTo(map);
});

// ── District shapes — real 55 planning area polygons (Master Plan 2019,
// data.gov.sg), clickable, color-coded by live score. Falls back to crude
// bounding-box rectangles only if the real GeoJSON can't be loaded. ──
let districtLayers = {};  // name -> Leaflet layer

function scoreColor(score) {
  if (score >= 75) return "#48BB78";   // good — green
  if (score >= 50) return "#F6AD55";   // moderate — orange
  return "#FC8181";                     // poor — red
}

function buildPopup(name, evalData) {
  const score = evalData.connectivity_score?.toFixed(0) ?? "—";
  return `
    <div class="popup-card">
      <div class="popup-header">📍 ${name}</div>
      <div class="popup-score">
        <div class="popup-score-value">${score}</div>
        <div class="popup-score-label">Connectivity Score / 100</div>
      </div>
      <div class="popup-grid">
        <div class="popup-metric">
          <div class="popup-metric-label">🚕 Live Taxis</div>
          <div class="popup-metric-value">${evalData.taxi_count ?? "—"}</div>
        </div>
        <div class="popup-metric">
          <div class="popup-metric-label">🚌 Bus Score</div>
          <div class="popup-metric-value">${evalData.bus_frequency_score?.toFixed(0) ?? "—"}/100</div>
        </div>
        <div class="popup-metric">
          <div class="popup-metric-label">⚡ Friction</div>
          <div class="popup-metric-value">${evalData.friction_ratio?.toFixed(3) ?? "—"}</div>
        </div>
        <div class="popup-metric">
          <div class="popup-metric-label">🚏 Bus Stops</div>
          <div class="popup-metric-value">${evalData.stops_in_bbox ?? "—"}</div>
        </div>
      </div>
      <div style="font-size:11px;color:#68d391;text-align:center;">${evalData.verdict || ""}</div>
    </div>
  `;
}

async function evaluateAndShowPopup(layer, name, bounds) {
  document.getElementById("loading").style.display = "block";
  try {
    const evalResp = await fetch(
      `${API_BASE}/evaluate?min_lon=${bounds.getWest()}&max_lon=${bounds.getEast()}&min_lat=${bounds.getSouth()}&max_lat=${bounds.getNorth()}`
    ).catch(() => null);
    const evalData = evalResp ? await evalResp.json() : {};
    layer.bindPopup(buildPopup(name, evalData), {maxWidth: 300}).openPopup();
  } finally {
    document.getElementById("loading").style.display = "none";
  }
}

function drawDistrictPolygon(feature) {
  const name = feature.properties.PLN_AREA_N;  // e.g. "BEDOK" — matches your district names exactly
  const scoreInfo = DISTRICT_SCORES[name] || DISTRICT_SCORES[toTitleCase(name)];
  const color = scoreInfo ? scoreColor(scoreInfo.score) : "#00BCD4";

  const layer = L.geoJSON(feature, {
    style: {color, weight: 1.5, fillColor: color, fillOpacity: 0.12},
  }).addTo(map);

  const bounds = layer.getBounds();
  const label = L.divIcon({
    html: `<div class="district-label">${toTitleCase(name)}${scoreInfo ? ` · ${scoreInfo.score.toFixed(0)}` : ""}</div>`,
    className: "",
    iconAnchor: [0, 0],
  });
  const labelMarker = L.marker(bounds.getCenter(), {icon: label, interactive: false}).addTo(map);

  // Embedded: clicking selects the district in the host dashboard (the
  // right-hand card + everything else updates). Standalone: live popup.
  layer.on("click", () => {
    if (!EMBEDDED || !selectDistrictInHost(name)) {
      evaluateAndShowPopup(layer, toTitleCase(name), bounds);
    }
  });
  layer.on("mouseover", () => layer.setStyle({fillOpacity: 0.32}));
  layer.on("mouseout", () => layer.setStyle({fillOpacity: 0.12}));

  districtLayers[name] = {layer, label: labelMarker};
}

function toTitleCase(s) {
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function drawDistrictBoxFallback(name, [minLat, minLon, maxLat, maxLon]) {
  // Only used if the real GeoJSON polygons can't be loaded at all.
  const scoreInfo = DISTRICT_SCORES[name];
  const color = scoreInfo ? scoreColor(scoreInfo.score) : "#00BCD4";
  const rect = L.rectangle(
    [[minLat, minLon], [maxLat, maxLon]],
    {color, weight: 1, fillColor: color, fillOpacity: 0.06}
  ).addTo(map);
  const label = L.divIcon({
    html: `<div class="district-label">${name}${scoreInfo ? ` · ${scoreInfo.score.toFixed(0)}` : ""}</div>`,
    className: "", iconAnchor: [0, 0],
  });
  L.marker([(minLat + maxLat) / 2, (minLon + maxLon) / 2], {icon: label, interactive: false}).addTo(map);
  rect.on("click", () => {
    if (!EMBEDDED || !selectDistrictInHost(name)) {
      evaluateAndShowPopup(rect, name, rect.getBounds());
    }
  });
  districtLayers[name] = {layer: rect};
}

const FALLBACK_DISTRICTS = {
  "Marine Parade": [1.295, 103.893, 1.316, 103.935],
  "Downtown CBD":  [1.277, 103.845, 1.295, 103.865],
  "Tengah":        [1.360, 103.720, 1.390, 103.760],
};

async function loadDistricts() {
  // 1. Get live scores first (used to color whichever shape source we end up with)
  try {
    const rankResp = await fetch(`${API_BASE}/rank`).catch(e => { console.error("GET /rank failed:", e); return null; });
    if (rankResp && rankResp.ok) {
      const rankList = await rankResp.json();
      if (Array.isArray(rankList)) {
        rankList.forEach(r => { DISTRICT_SCORES[r.district] = {score: r.score, verdict: r.verdict}; });
        console.log(`Loaded live scores for ${rankList.length} districts from /rank`);
      }
    } else {
      console.warn("/rank unavailable — districts will be drawn without score colors.");
    }
  } catch (e) {
    console.error("Unexpected error loading /rank:", e);
  }

  // 2. Try real polygon boundaries first — inline copy (always available when
  // embedded) before falling back to the API fetch (standalone serving).
  try {
    let geojson = INLINE_GEOJSON;
    if (!geojson) {
      const geoResp = await fetch(`${API_BASE}/planning_areas.geojson`).catch(e => { console.error("GET /planning_areas.geojson failed:", e); return null; });
      if (geoResp && geoResp.ok) geojson = await geoResp.json();
    }
    if (geojson && Array.isArray(geojson.features) && geojson.features.length > 0) {
      let drawn = 0, failed = 0;
      geojson.features.forEach(feature => {
        try { drawDistrictPolygon(feature); drawn++; }
        catch (e) { failed++; console.error("Failed to draw polygon for a feature:", e); }
      });
      console.log(`Real district polygons: ${drawn} drawn, ${failed} failed.`);
      return;  // success — don't fall through to rectangles
    }
    console.error("No usable planning-area geojson (inline or API) — falling back to rectangles.");
  } catch (e) {
    console.error("Unexpected error loading planning_areas.geojson — falling back to rectangles.", e);
  }

  // 3. Fall back to real bboxes from /districts, or the 3 hardcoded ones as a last resort
  try {
    const districtsResp = await fetch(`${API_BASE}/districts`).catch(() => null);
    DISTRICTS = (districtsResp && districtsResp.ok) ? await districtsResp.json() : FALLBACK_DISTRICTS;
  } catch (e) {
    DISTRICTS = FALLBACK_DISTRICTS;
  }
  let drawn = 0, failed = 0;
  Object.entries(DISTRICTS).forEach(([name, bbox]) => {
    try { drawDistrictBoxFallback(name, bbox); drawn++; }
    catch (e) { failed++; console.error(`Failed to draw fallback box for "${name}":`, e); }
  });
  console.log(`Fallback bounding boxes: ${drawn} drawn, ${failed} failed.`);
}
loadDistricts();

// ── Legend ─────────────────────────────────────────────────────────────────
const legendDiv = document.createElement("div");
legendDiv.className = "legend";
legendDiv.innerHTML = `
  <div class="legend-title">MRT Lines</div>
  ${Object.entries(MRT_COLORS).map(([line, color]) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      ${line}
    </div>
  `).join("")}
  <div style="margin-top:8px;" class="legend-title">District Score</div>
  <div class="legend-item"><div class="legend-dot" style="background:#48BB78"></div>Good ≥75</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F6AD55"></div>Moderate 50–74</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FC8181"></div>Poor &lt;50</div>
  <div style="font-size:10px;color:#718096;margin-top:6px;">Click a district to select it</div>
`;
map.getContainer().appendChild(legendDiv);

// ── Postal code search ─────────────────────────────────────────────────────
let searchMarker = null;
let busMarkers   = [];

async function searchPostal(postal) {
  document.getElementById("loading").style.display = "block";

  try {
    // 1. Geocode postal code via OneMap
    const geoResp = await fetch(
      `${ONEMAP_URL}?searchVal=${postal}&returnGeom=Y&getAddrDetails=Y`
    );
    const geoData = await geoResp.json();
    const results = geoData.results || [];

    if (!results.length) {
      alert(`Postal code ${postal} not found!`);
      return;
    }

    const loc  = results[0];
    const lat  = parseFloat(loc.LATITUDE);
    const lng  = parseFloat(loc.LONGITUDE);
    const addr = loc.ADDRESS || postal;

    // Clear previous markers
    if (searchMarker) map.removeLayer(searchMarker);
    busMarkers.forEach(m => map.removeLayer(m));
    busMarkers = [];

    // 2. Get connectivity score from our API
    const delta = 0.005;
    const evalResp = await fetch(
      `${API_BASE}/evaluate?min_lon=${lng-delta}&max_lon=${lng+delta}&min_lat=${lat-delta}&max_lat=${lat+delta}`
    ).catch(() => null);
    const evalData = evalResp ? await evalResp.json() : {};

    // 3. Create popup content
    const score     = evalData.connectivity_score?.toFixed(1) || "—";
    const taxis     = evalData.taxi_count ?? "—";
    const busScore  = evalData.bus_frequency_score?.toFixed(0) || "—";
    const friction  = evalData.friction_ratio?.toFixed(3) || "—";

    const popupHtml = `
      <div class="popup-card">
        <div class="popup-header">📍 ${addr}</div>
        <div class="popup-postal">S${postal}</div>
        <div class="popup-score">
          <div class="popup-score-value">${score}</div>
          <div class="popup-score-label">Connectivity Score / 100</div>
        </div>
        <div class="popup-grid">
          <div class="popup-metric">
            <div class="popup-metric-label">🚕 Live Taxis</div>
            <div class="popup-metric-value">${taxis}</div>
            <div class="popup-metric-sub">nearby now</div>
          </div>
          <div class="popup-metric">
            <div class="popup-metric-label">🚌 Bus Score</div>
            <div class="popup-metric-value">${busScore}/100</div>
            <div class="popup-metric-sub">frequency rating</div>
          </div>
          <div class="popup-metric">
            <div class="popup-metric-label">⚡ Friction</div>
            <div class="popup-metric-value">${friction}</div>
            <div class="popup-metric-sub">demand pressure</div>
          </div>
          <div class="popup-metric">
            <div class="popup-metric-label">🚏 Bus Stops</div>
            <div class="popup-metric-value">${evalData.stops_in_bbox ?? "—"}</div>
            <div class="popup-metric-sub">in district</div>
          </div>
        </div>
        <div style="font-size:11px;color:#68d391;text-align:center;">
          ${evalData.verdict || ""}
        </div>
      </div>
    `;

    // 4. Add marker with popup
    const icon = L.divIcon({
      html: `<div style="
        width:16px;height:16px;
        background:#FF6B6B;
        border:3px solid white;
        border-radius:50%;
        box-shadow:0 2px 8px rgba(0,0,0,0.5);
      "></div>`,
      className: "",
      iconSize: [16,16],
      iconAnchor: [8,8],
    });

    searchMarker = L.marker([lat, lng], {icon})
      .addTo(map)
      .bindPopup(popupHtml, {maxWidth: 300})
      .openPopup();

    map.setView([lat, lng], 15);

  } finally {
    document.getElementById("loading").style.display = "none";
  }
}

// ── Listen for messages from Streamlit ────────────────────────────────────
window.addEventListener("message", (event) => {
  if (event.data && event.data.type === "search_postal") {
    searchPostal(event.data.postal);
  }
  if (event.data && event.data.type === "set_heatmap") {
    updateHeatmap(event.data.points);
  }
});

// ── Heatmap layer ─────────────────────────────────────────────────────────
let heatLayer = null;

function updateHeatmap(points) {
  if (heatLayer) map.removeLayer(heatLayer);
  if (!points || !points.length) return;
  heatLayer = L.heatLayer(points, {
    radius: 25,
    blur: 15,
    maxZoom: 17,
    gradient: {0.0:"blue", 0.5:"lime", 1.0:"red"},
  }).addTo(map);
}

// ── Click on map → search postal ───────────────────────────────────────────
map.on("click", async (e) => {
  const {lat, lng} = e.latlng;
  document.getElementById("loading").style.display = "block";

  try {
    // Reverse geocode clicked location
    const resp = await fetch(
      `https://www.onemap.gov.sg/api/public/revgeocode?location=${lat},${lng}&buffer=50&addressType=HDB&otherFeatures=N`
    );
    const data = await resp.json();
    const info = data.GeocodeInfo?.[0];

    if (info?.POSTALCODE && info.POSTALCODE !== "NIL") {
      searchPostal(info.POSTALCODE);
    } else {
      // No HDB block — just show coordinates
      const score_resp = await fetch(
        `${API_BASE}/evaluate?min_lon=${lng-0.005}&max_lon=${lng+0.005}&min_lat=${lat-0.005}&max_lat=${lat+0.005}`
      ).catch(() => null);
      const evalData = score_resp ? await score_resp.json() : {};
      const score = evalData.connectivity_score?.toFixed(1) || "—";

      if (searchMarker) map.removeLayer(searchMarker);
      const icon = L.divIcon({
        html:`<div style="width:12px;height:12px;background:#FF6B6B;border:2px solid white;border-radius:50%;"></div>`,
        className:"",iconSize:[12,12],iconAnchor:[6,6],
      });
      searchMarker = L.marker([lat,lng],{icon})
        .addTo(map)
        .bindPopup(`
          <div class="popup-card">
            <div class="popup-header">📍 (${lat.toFixed(4)}, ${lng.toFixed(4)})</div>
            <div class="popup-score">
              <div class="popup-score-value">${score}</div>
              <div class="popup-score-label">Connectivity Score</div>
            </div>
            <div style="font-size:11px;color:#a0aec0;text-align:center;">
              ${evalData.verdict || "No HDB block at this location"}
            </div>
          </div>
        `, {maxWidth:260})
        .openPopup();
    }
  } finally {
    document.getElementById("loading").style.display = "none";
  }
});

// Notify parent that map is ready
// ── Direct postal search wiring (the search box is now part of this page
// itself, not something a Streamlit host sends in via postMessage) ──
document.getElementById("postal-search-btn").addEventListener("click", () => {
  const val = document.getElementById("postal-input").value.trim();
  if (val) searchPostal(val);
});
document.getElementById("postal-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const val = e.target.value.trim();
    if (val) searchPostal(val);
  }
});

window.parent.postMessage({type: "map_ready"}, "*");
</script>
</body>
</html>
