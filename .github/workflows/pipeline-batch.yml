# Automated pipeline batch — runs the SG transit collection + ML jobs in the
# cloud every 30 minutes so nothing needs to run on a personal machine.
#
# Data lives on the single-commit `pipeline-data` branch (force-pushed each
# run, pruned to 14 days) — NOT on main, so main's history stays clean and
# the repo never accumulates database blobs.
#
# Required repo secret: LTA_API_KEY (Settings → Secrets and variables →
# Actions). Optional: nothing else — OneMap isn't used by the batch.
name: pipeline-batch

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (GitHub may delay a few minutes)
  workflow_dispatch:
    inputs:
      force_train:
        description: "Force the daily train/evaluate step"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: pipeline-batch
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Restore previous pipeline data
        run: |
          git fetch origin pipeline-data --depth 1 || true
          if git rev-parse --verify origin/pipeline-data >/dev/null 2>&1; then
            git checkout origin/pipeline-data -- data || true
            echo "restored data/ from pipeline-data branch"
          else
            echo "no pipeline-data branch yet — starting fresh"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-batch.txt

      - name: Install batch dependencies
        run: pip install -r requirements-batch.txt

      - name: Collect + predict + prune
        env:
          LTA_API_KEY: ${{ secrets.LTA_API_KEY }}
          BATCH_FORCE_TRAIN: ${{ inputs.force_train && '1' || '0' }}
        run: python scripts/batch_collect.py

      - name: Publish to pipeline-data branch
        run: |
          git config user.name "pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git switch --orphan pipeline-data-next
          git add -f data/transport.db
          git add -f data/models 2>/dev/null || true
          git commit -m "pipeline data $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push origin pipeline-data-next:pipeline-data --force
