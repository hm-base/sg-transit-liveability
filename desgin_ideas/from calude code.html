<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HDB Liveability Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Mono',monospace;background:#0d1520;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
#app{min-height:100vh}
button{font-family:'Space Mono',monospace;cursor:pointer;border:none;outline:none}
input{font-family:'Space Mono',monospace;outline:none}
select{font-family:'Space Mono',monospace;cursor:pointer}

/* Onboarding */
.onboarding{min-height:100vh;background:linear-gradient(135deg,#0d1520 0%,#1a2540 50%,#0d1520 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.ob-logo{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 2rem;font-size:2rem}
.ob-title{font-size:2.2rem;font-weight:700;color:#fff;margin-bottom:.5rem}
.ob-subtitle{font-size:.9rem;color:#94a3b8;margin-bottom:3rem;max-width:400px;line-height:1.6}
.ob-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:600px;width:100%;margin-bottom:3rem}
.ob-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.2rem;text-align:left}
.ob-card-icon{font-size:1.5rem;margin-bottom:.5rem}
.ob-card-title{font-size:.75rem;font-weight:700;color:#fff;margin-bottom:.3rem}
.ob-card-desc{font-size:.65rem;color:#64748b;line-height:1.5}
.ob-btn{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:.9rem;font-weight:700;padding:.9rem 2.5rem;border-radius:10px;border:none;cursor:pointer;transition:opacity .2s}
.ob-btn:hover{opacity:.9}
.ob-note{font-size:.65rem;color:#475569;margin-top:1rem}

/* Navbar */
.navbar{background:#111827;border-bottom:1px solid #1e293b;padding:.6rem 1rem;display:flex;align-items:center;gap:.6rem;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav-back{background:rgba(255,255,255,.08);color:#94a3b8;font-size:.7rem;padding:.35rem .7rem;border-radius:6px;border:1px solid #1e293b;display:flex;align-items:center;gap:.3rem;cursor:pointer}
.nav-back:hover{background:rgba(255,255,255,.12)}
.nav-search{flex:1;min-width:140px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:.4rem .7rem;color:#e2e8f0;font-size:.75rem}
.nav-search::placeholder{color:#475569}
.nav-select{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:.4rem .5rem;color:#e2e8f0;font-size:.72rem}
.nav-icon-btn{background:rgba(255,255,255,.05);border:1px solid #1e293b;border-radius:8px;padding:.4rem .6rem;color:#94a3b8;font-size:.9rem;cursor:pointer}
.nav-icon-btn:hover{background:rgba(255,255,255,.1)}

/* Map */
.map-hero{position:relative;height:380px}
#map{width:100%;height:100%}
.map-score-card{position:absolute;top:12px;left:12px;z-index:400;background:rgba(17,24,39,.92);border:1px solid #334155;border-radius:12px;padding:.8rem 1rem;min-width:160px;backdrop-filter:blur(8px)}
.msc-district{font-size:.65rem;color:#64748b;margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.05em}
.msc-score{font-size:2rem;font-weight:700;line-height:1}
.msc-label{font-size:.65rem;font-weight:700;margin-top:.2rem;text-transform:uppercase;letter-spacing:.05em}
.msc-formula{font-size:.55rem;color:#64748b;margin-top:.3rem}
.map-style-picker{position:absolute;top:12px;right:12px;z-index:400;display:flex;flex-direction:column;gap:.3rem}
.msp-btn{background:rgba(17,24,39,.88);border:1px solid #334155;border-radius:6px;padding:.3rem .5rem;color:#94a3b8;font-size:.6rem;cursor:pointer;text-align:center;transition:all .15s}
.msp-btn.active,.msp-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}
.map-legend{position:absolute;bottom:12px;left:12px;z-index:400;background:rgba(17,24,39,.88);border:1px solid #334155;border-radius:8px;padding:.5rem .7rem;backdrop-filter:blur(4px)}
.ml-item{display:flex;align-items:center;gap:.4rem;font-size:.6rem;color:#94a3b8;margin-bottom:.2rem}
.ml-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Metrics strip */
.metrics-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#0d1520;border-bottom:1px solid #1e293b}
@media(min-width:600px){.metrics-strip{grid-template-columns:repeat(6,1fr)}}
.metric-card{background:#111827;padding:.8rem .6rem;text-align:center}
.mc-label{font-size:.55rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem}
.mc-value{font-size:1.1rem;font-weight:700;color:#e2e8f0}
.mc-unit{font-size:.6rem;color:#475569;margin-top:.1rem}
.mc-trend{font-size:.6rem;margin-top:.2rem}

/* Tab bar */
.tab-bar{display:flex;background:#111827;border-bottom:1px solid #1e293b;overflow-x:auto}
.tab-btn{flex:1;min-width:80px;padding:.7rem .4rem;font-size:.65rem;font-weight:700;color:#475569;text-align:center;cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6}
.tab-btn:hover:not(.active){color:#94a3b8}

/* Tab content */
.tab-content{padding:1rem;background:#0d1520;min-height:300px}

/* Overview */
.section-title{font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.8rem}
.alert-banner{border-radius:8px;padding:.7rem .9rem;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;font-size:.72rem}
.ab-clear{background:#0f2027;border:1px solid #164e63;color:#67e8f9}
.ab-low{background:#2d1515;border:1px solid #7f1d1d;color:#fca5a5}
.ab-flux{background:#2d2208;border:1px solid #713f12;color:#fcd34d}
.ab-bus{background:#0f1b3a;border:1px solid #1e3a5f;color:#93c5fd}
.bus-svc-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.bus-svc{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:.3rem .6rem;font-size:.7rem;color:#e2e8f0}
.chart-placeholder{background:#111827;border:1px solid #1e293b;border-radius:8px;height:140px;display:flex;align-items:center;justify-content:center;color:#334155;font-size:.75rem;margin-bottom:1rem;position:relative;overflow:hidden}
.bar-chart{display:flex;align-items:flex-end;gap:2px;height:100%;width:100%;padding:.5rem}
.bar{flex:1;border-radius:2px 2px 0 0;min-height:4px;transition:height .3s}
.activity-list{display:flex;flex-direction:column;gap:.5rem}
.activity-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:.6rem .8rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.ai-left{display:flex;align-items:center;gap:.6rem}
.ai-icon{font-size:1rem;width:28px;text-align:center}
.ai-text{font-size:.7rem;color:#e2e8f0}
.ai-sub{font-size:.6rem;color:#475569}
.ai-badge{font-size:.6rem;font-weight:700;padding:.2rem .5rem;border-radius:20px}
.badge-good{background:#ecfdf5;color:#059669}
.badge-mod{background:#fffbeb;color:#d97706}
.badge-poor{background:#fff1f2;color:#dc2626}

/* Heatmap */
.heatmap-grid{display:grid;grid-template-columns:auto repeat(7,1fr);gap:2px;font-size:.55rem}
.hm-header{color:#475569;text-align:center;padding:.2rem;font-weight:700}
.hm-row-label{color:#475569;padding:.2rem .4rem;display:flex;align-items:center;white-space:nowrap;font-size:.55rem}
.hm-cell{height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;color:rgba(255,255,255,.8);cursor:pointer;transition:transform .1s}
.hm-cell:hover{transform:scale(1.1);z-index:10;position:relative;box-shadow:0 0 8px rgba(0,0,0,.5)}

/* Price Trends */
.price-row{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;border-bottom:1px solid #1e293b;font-size:.72rem}
.price-rank{color:#475569;width:20px;text-align:right;flex-shrink:0}
.price-town{flex:1;color:#e2e8f0;min-width:80px}
.price-bar-wrap{width:80px;height:8px;background:#1e293b;border-radius:4px;overflow:hidden;flex-shrink:0}
.price-bar{height:100%;border-radius:4px}
.price-val{width:70px;text-align:right;color:#94a3b8;font-size:.6rem}

/* Compare */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.compare-card{border-radius:10px;padding:1rem;border:1px solid}
.cc-name{font-size:.75rem;font-weight:700;margin-bottom:.3rem}
.cc-score{font-size:1.8rem;font-weight:700;margin-bottom:.3rem}
.cc-stat{font-size:.65rem;margin-bottom:.2rem}

/* Deep Dive */
.dd-hero{background:linear-gradient(135deg,#1a2540,#0d1520);padding:1.2rem;border-bottom:1px solid #1e293b}
.score-bar-row{margin-bottom:.8rem}
.sbr-label{display:flex;justify-content:space-between;font-size:.65rem;margin-bottom:.3rem}
.sbr-label span:first-child{color:#94a3b8}
.sbr-label span:last-child{font-weight:700}
.sbr-track{height:8px;background:#1e293b;border-radius:4px;overflow:hidden}
.sbr-fill{height:100%;border-radius:4px}

/* Postal */
.postal-hero{background:#111827;border-bottom:1px solid #1e293b;padding:1rem}
.radius-tabs{display:flex;gap:.4rem;margin-bottom:1rem}
.radius-tab{padding:.3rem .7rem;border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#64748b}
.radius-tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.stop-list{display:flex;flex-direction:column;gap:.4rem}
.stop-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:.6rem .8rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
.si-name{font-size:.72rem;color:#e2e8f0}
.si-dist{font-size:.6rem;color:#475569}
.si-svcs{display:flex;gap:.3rem;flex-wrap:wrap}
.si-svc{background:#1e293b;border-radius:4px;padding:.15rem .35rem;font-size:.55rem;color:#94a3b8}

/* Glossary */
.gloss-list{display:flex;flex-direction:column;gap:.5rem}
.gloss-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:.8rem}
.gloss-term{font-size:.75rem;font-weight:700;color:#3b82f6;margin-bottom:.3rem}
.gloss-def{font-size:.68rem;color:#94a3b8;line-height:1.6}
.gloss-formula{background:#0d1520;border:1px solid #334155;border-radius:6px;padding:.5rem;margin-top:.4rem;font-size:.6rem;color:#67e8f9;font-family:'Space Mono',monospace}

/* Card Layout */
.cl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
.cl-card{border-radius:10px;padding:1rem;border:1px solid}
.cl-card-title{font-size:.75rem;font-weight:700;margin-bottom:.3rem}
.cl-card-score{font-size:2rem;font-weight:700}
.cl-card-sub{font-size:.6rem;margin-top:.2rem}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:#111827;border:1px solid #334155;border-radius:14px;width:100%;max-width:380px;padding:1.5rem}
.modal-close{float:right;background:rgba(255,255,255,.1);border:none;color:#94a3b8;cursor:pointer;border-radius:6px;padding:.2rem .5rem;font-size:.8rem}

/* District marker */
.dist-marker{background:#fff;border-radius:8px;padding:2px 5px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;border:2px solid;cursor:pointer;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:transform .1s;line-height:1.4}
.dist-marker:hover{transform:scale(1.1)}

.ticker-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.live-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;font-size:.7rem;color:#94a3b8}
</style>
</head>

  {term:'Liveability Score',def:'A composite index (0–100) measuring how well-connected and transport-accessible an HDB district is. Combines public bus coverage, taxi availability, and friction factors.',formula:'Score = Bus×50% + Taxi×30% − Friction×20%'},
  {term:'Bus Index (50%)',def:'Weighted by number of unique services passing through district bus stops, proximity of stops to residential blocks, and frequency during peak hours.'},
  {term:'Taxi Index (30%)',def:'Represents real-time taxi availability within 500m radius. Updated every 2.5s from LTA DataMall. Higher counts reflect better on-demand mobility.'},
  {term:'Friction Factor (20%)',def:'Penalises districts with traffic congestion, long waiting times at bus stops, or poor pedestrian connectivity between MRT exits and residences.'},
  {term:'GOOD (≥80)',def:'District has excellent transport connectivity. Residents can reliably access public transit within a 5-minute walk during all periods including off-peak.'},
  {term:'MODERATE (65–79)',def:'District has acceptable transport options but may experience gaps during off-peak hours or in sub-zones further from the MRT/interchange.'},
  {term:'POOR (<65)',def:'District has limited or unreliable transport. May lack MRT access, have infrequent bus services, or experience chronic taxi shortfalls during peak demand.'},
  {term:'Value-for-Money (VFM)',def:'Composite of liveability score divided by median resale price (per sqm normalised). Higher VFM means better transport access per dollar spent.'},
  {term:'7×24 Heatmap',def:'Visualises taxi demand patterns across 7 time slots and 7 days of the week. Darker colours = higher demand; red = critically high demand.'},
  {term:'Anomaly Alert',def:'System flag when live metrics deviate >2σ from 30-day baseline. LOW_TAX = taxi shortage, HIGH_FLUX = unusual demand surge, BUS_GAP = service disruption.'},
];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function grade(score) { return score >= 80 ? 'GOOD' : score >= 65 ? 'MODERATE' : 'POOR'; }
function gradeColor(score) { return score >= 80 ? '#059669' : score >= 65 ? '#d97706' : '#dc2626'; }
function gradePastel(score) { return score >= 80 ? '#ecfdf5' : score >= 65 ? '#fffbeb' : '#fff1f2'; }
function gradeBorder(score) { return score >= 80 ? '#6ee7b7' : score >= 65 ? '#fcd34d' : '#fca5a5'; }
function gradeBadge(score) { return score >= 80 ? 'badge-good' : score >= 65 ? 'badge-mod' : 'badge-poor'; }
function getScore(name) { const d = DISTRICTS.find(x => x.name === name); return d ? d.score : 75; }

function fmt(n) {
  return n >= 1000000 ? 'S$' + (n/1000000).toFixed(2) + 'M' : 'S$' + n.toLocaleString();
}

function heatVal(t, d) {
  const ti = TIMES_FULL.indexOf(t);
  const di = DAYS_SHORT.indexOf(d);
  const base = 35 + Math.sin(ti * 0.9) * 28 + Math.cos(di * 0.55) * 15;
  const weekend = (d === 'Sat' || d === 'Sun') ? -18 : 0;
  const peak = (t === '8–10am' || t === '6–8pm') ? 28 : 0;
  return Math.max(8, Math.min(98, Math.round(base + weekend + peak)));
}

function heatColor(v) {
  if (v >= 78) return `rgba(239,68,68,${0.5 + v/200})`;
  if (v >= 58) return `rgba(251,146,60,${0.4 + v/200})`;
  if (v >= 38) return `rgba(250,204,21,${0.35 + v/200})`;
  return `rgba(59,130,246,${0.25 + v/200})`;
}

// ─── LEAFLET MAP ──────────────────────────────────────────────────────────────
let _map = null, _tileLayer = null, _markers = {};

function initMap() {
  if (_map) return;
  _map = L.map('map', {
    center: [1.352, 103.82],
    zoom: 11.5,
    zoomControl: false,
    attributionControl: false,
  });
  L.control.zoom({ position: 'bottomright' }).addTo(_map);
  _tileLayer = L.tileLayer(TILES[state.tileKey].url, { maxZoom: 18 }).addTo(_map);
  DISTRICTS.forEach(d => addMarker(d.name));
}

function addMarker(name) {
  if (!COORDS[name]) return;
  const [lat, lng] = COORDS[name];
  const s = getScore(name);
  const el = document.createElement('div');
  el.className = 'dist-marker';
  el.style.cssText = `color:${gradeColor(s)};border-color:${gradeBorder(s)};background:${gradePastel(s)}`;
  el.innerHTML = `<span style="color:#374151;font-size:9px">${name}</span>&nbsp;<strong style="color:${gradeColor(s)}">${s}</strong>`;
  el.addEventListener('click', () => window.app.selectDistrict(name));
  const icon = L.divIcon({ html: el, iconSize: null, className: '' });
  _markers[name] = L.marker([lat, lng], { icon }).addTo(_map);
}

function refreshMarker(name) {
  if (!_markers[name] || !_map) return;
  const s = getScore(name);
  const el = document.createElement('div');
  el.className = 'dist-marker';
  el.style.cssText = `color:${gradeColor(s)};border-color:${gradeBorder(s)};background:${gradePastel(s)}`;
  el.innerHTML = `<span style="color:#374151;font-size:9px">${name}</span>&nbsp;<strong style="color:${gradeColor(s)}">${s}</strong>`;
  el.addEventListener('click', () => window.app.selectDistrict(name));
  _markers[name].setIcon(L.divIcon({ html: el, iconSize: null, className: '' }));
}

function updateMapTile() {
  if (!_map) return;
  if (_tileLayer) _map.removeLayer(_tileLayer);
  _tileLayer = L.tileLayer(TILES[state.tileKey].url, { maxZoom: 18 }).addTo(_map);
}

function panToDistrict(name) {
  if (_map && COORDS[name]) _map.panTo(COORDS[name], { animate: true, duration: 0.4 });
}

                <div style="font-size:1.8rem;font-weight:700;color:${gradeColor(s)}">${s}</div>
                <span class="ai-badge ${gradeBadge(s)}">${grade(s)}</span>
              </div>
            </div>
            <div class="score-bar-row">
              <div class="sbr-label"><span>Bus Index</span><span style="color:#3b82f6">${busScore}%</span></div>
              <div class="sbr-track"><div class="sbr-fill" style="width:${busScore}%;background:#3b82f6"></div></div>
            </div>
            <div class="score-bar-row">
              <div class="sbr-label"><span>Taxi Index</span><span style="color:#22c55e">${taxiScore}%</span></div>
              <div class="sbr-track"><div class="sbr-fill" style="width:${taxiScore}%;background:#22c55e"></div></div>
            </div>
            <div class="score-bar-row" style="margin-bottom:0">
              <div class="sbr-label"><span>Friction Penalty</span><span style="color:#ef4444">−${frictionPct}%</span></div>
              <div class="sbr-track"><div class="sbr-fill" style="width:${frictionPct}%;background:#ef4444"></div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${renderWeightsModal()}
  `;
}

// ─── POSTAL RESULT ────────────────────────────────────────────────────────────
function renderPostalResult() {
  const code = state.postalCode;
  const p = POSTAL[code];
  if (!p) {
    return `${renderNav(true, 'dashboard')}
      <div style="padding:2rem;text-align:center">
        <div style="color:#64748b;font-size:.8rem;margin-bottom:.5rem">Postal code not found</div>
        <div style="font-size:.7rem;color:#334155">Try: 825234 · 820413 · 570033 · 730207 · 150033</div>
      </div>`;
  }
  const r = state.postalRadius;
  const taxis = p.taxis[r] || p.taxis[500];
  const sc_count = p.sc[r] || p.sc[500];
  const ds = getScore(p.district);
  return `
    ${renderNav(true, 'dashboard')}
    <div class="postal-hero">
      <div style="font-size:.6rem;color:#64748b;margin-bottom:.2rem;text-transform:uppercase">Postal Code · ${code}</div>
      <div style="font-size:1rem;font-weight:700;color:#fff">${p.block}</div>
      <div style="font-size:.7rem;color:#64748b;margin-bottom:.4rem">${p.unit}</div>
      <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
        <span style="font-size:1.3rem;font-weight:700;color:${gradeColor(ds)}">${ds}</span>
        <span class="ai-badge ${gradeBadge(ds)}">${grade(ds)}</span>
        <span style="font-size:.6rem;color:#64748b">${p.district} district liveability</span>
      </div>
    </div>
    <div style="padding:1rem">
      <div class="section-title">Radius</div>
      <div class="radius-tabs">
        ${[250,500,1000].map(rv => `<button class="radius-tab${r===rv?' active':''}" onclick="window.app.setRadius(${rv})">${rv}m</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem">
        <div style="background:#111827;border:1px solid #1e293b;border-radius:8px;padding:.8rem;text-align:center">
          <div style="font-size:.55rem;color:#64748b;text-transform:uppercase;margin-bottom:.3rem">Taxis within ${r}m</div>
          <div style="font-size:1.5rem;font-weight:700;color:#22c55e">${taxis}</div>
          <span class="ticker-dot" style="margin-top:.2rem"></span>
        </div>
        <div style="background:#111827;border:1px solid #1e293b;border-radius:8px;padding:.8rem;text-align:center">
          <div style="font-size:.55rem;color:#64748b;text-transform:uppercase;margin-bottom:.3rem">School/Comm Cars within ${r}m</div>
          <div style="font-size:1.5rem;font-weight:700;color:#3b82f6">${sc_count}</div>
          <div style="font-size:.55rem;color:#475569;margin-top:.2rem">vehicles</div>
        </div>
      </div>
      <div class="section-title">Nearby Bus Stops</div>
      <div class="stop-list">
        ${p.stops.map(s => `
          <div class="stop-item">
            <div style="flex:1;min-width:0">
              <div class="si-name">${s.name}</div>
              <div class="si-dist">${s.dist} away</div>
            </div>
            <div class="si-svcs">${s.svcs.map(sv => `<span class="si-svc">${sv}</span>`).join('')}</div>
          </div>`).join('')}
      </div>
      <div style="margin-top:1rem;background:#111827;border:1px solid #1e293b;border-radius:8px;padding:.7rem;text-align:center">
        <div style="font-size:.6rem;color:#475569;margin-bottom:.4rem">Try other postal codes:</div>
        <div style="display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap">
          ${Object.keys(POSTAL).map(c => `<button onclick="window.app.searchPostalCode('${c}')" style="background:#1e293b;border:1px solid #334155;border-radius:6px;padding:.3rem .6rem;color:#3b82f6;font-size:.65rem;cursor:pointer;font-family:inherit">${c}</button>`).join('')}
        </div>
      </div>
    </div>
  `;
}

// ─── CARD LAYOUT REFERENCE ────────────────────────────────────────────────────
function renderCardLayout() {
  const examples = DISTRICTS.slice(0, 6);
  return `
    ${renderNav(true, 'dashboard')}
    <div style="padding:1rem">
      <div style="font-size:.65rem;color:#64748b;text-transform:uppercase;margin-bottom:.3rem">Card Layout Reference</div>
      <div style="font-size:.75rem;color:#94a3b8;margin-bottom:1rem">Score card variants and design tokens</div>
      <div class="cl-grid">
        ${examples.map(d => `
          <div class="cl-card" style="background:${gradePastel(d.score)};border-color:${gradeBorder(d.score)}">
            <div class="cl-card-title" style="color:#374151">${d.name}</div>
            <div class="cl-card-score" style="color:${gradeColor(d.score)}">${d.score}</div>
            <div class="cl-card-sub" style="color:${gradeColor(d.score)};font-weight:700">${grade(d.score)}</div>
            <div style="margin-top:.5rem;font-size:.5rem;color:#6b7280;line-height:1.7">
              bg: ${gradePastel(d.score)}<br>
              border: ${gradeBorder(d.score)}<br>
              text: ${gradeColor(d.score)}
            </div>
          </div>`).join('')}
      </div>
      <div class="section-title" style="margin-top:1.2rem">Score Thresholds</div>
      ${[{range:'≥ 80',label:'GOOD',c:'#059669',bg:'#ecfdf5',b:'#6ee7b7'},{range:'65–79',label:'MODERATE',c:'#d97706',bg:'#fffbeb',b:'#fcd34d'},{range:'< 65',label:'POOR',c:'#dc2626',bg:'#fff1f2',b:'#fca5a5'}].map(t => `
        <div style="background:${t.bg};border:1px solid ${t.b};border-radius:8px;padding:.6rem .9rem;margin-bottom:.4rem;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:.85rem;font-weight:700;color:${t.c}">${t.label}</span>
          <span style="font-size:.72rem;color:#374151">${t.range}</span>
          <span style="font-size:.55rem;color:#6b7280;font-family:monospace">${t.c}</span>
        </div>`).join('')}
      <div class="section-title" style="margin-top:1.2rem">Scoring Formula</div>
      <div style="background:#111827;border:1px solid #334155;border-radius:8px;padding:.9rem;font-family:'Space Mono',monospace;font-size:.7rem;color:#67e8f9;line-height:2">
        Score = (Bus_Index × 0.50)<br>
              + (Taxi_Index × 0.30)<br>
              − (Friction × 0.20)<br>
        <span style="color:#475569;font-size:.6rem">
          Bus_Index  = f(stops, services, frequency)<br>
          Taxi_Index = live_taxis_500m × normalisation<br>
          Friction   = congestion + walk_penalty
        </span>
      </div>
      <div style="text-align:center;margin-top:1rem">
        <button onclick="window.app.showWeights()" style="background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:.7rem;font-weight:700;padding:.5rem 1.2rem;cursor:pointer;font-family:inherit">
          View Score Weights Modal
        </button>
      </div>
    </div>
    ${renderWeightsModal()}
  `;
}

// ─── GLOSSARY ─────────────────────────────────────────────────────────────────
function renderGlossary() {
  return `
    ${renderNav(true, 'dashboard')}
    <div style="padding:1rem">
      <div style="font-size:.65rem;color:#64748b;text-transform:uppercase;margin-bottom:.3rem">Glossary</div>
      <div style="font-size:.75rem;color:#94a3b8;margin-bottom:1rem">Key terms and formulae used in this dashboard</div>
      <div class="gloss-list">
        ${GLOSSARY.map(g => `
          <div class="gloss-item">
            <div class="gloss-term">${g.term}</div>
            <div class="gloss-def">${g.def}</div>
            ${g.formula ? `<div class="gloss-formula">${g.formula}</div>` : ''}
          </div>`).join('')}
      </div>
    </div>
    ${renderWeightsModal()}
  `;
}

// ─── WEIGHTS MODAL ────────────────────────────────────────────────────────────
function renderWeightsModal() {
  if (!state.showWeightsModal) return '';
  return `<div class="modal-overlay" onclick="if(event.target===this)window.app.hideWeights()">
    <div class="modal">
      <button class="modal-close" onclick="window.app.hideWeights()">✕</button>
      <div style="font-size:.9rem;font-weight:700;color:#fff;margin-bottom:1rem">Score Weights</div>
      ${[{l:'Bus Index',pct:50,c:'#3b82f6'},{l:'Taxi Index',pct:30,c:'#22c55e'},{l:'Friction Penalty',pct:20,c:'#ef4444'}].map(w => `
        <div style="margin-bottom:.9rem">
          <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:.3rem">
            <span style="color:#e2e8f0">${w.l}</span>
            <span style="color:${w.c};font-weight:700">${w.pct}%</span>
          </div>
          <div style="height:8px;background:#1e293b;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${w.pct * 2}%;background:${w.c};border-radius:4px"></div>
          </div>
        </div>`).join('')}
      <div style="background:#0d1520;border:1px solid #334155;border-radius:8px;padding:.7rem;font-family:'Space Mono',monospace;font-size:.65rem;color:#67e8f9;margin-top:.5rem">
        Score = Bus×0.50 + Taxi×0.30 − Friction×0.20
      </div>
      <div style="margin-top:.8rem;font-size:.6rem;color:#475569;line-height:1.6">
        Scores refresh every 2.5s from live LTA DataMall taxi positions. Bus and friction indices are recomputed daily from GTFS feeds.
      </div>
    </div>
  </div>`;
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function renderOnboarding() {
  return `<div class="onboarding">
    <div class="ob-logo">🏘</div>
    <div class="ob-title">HDB Liveability</div>
    <div class="ob-subtitle">Real-time transport connectivity scores for every HDB district in Singapore. Powered by live LTA DataMall data.</div>
    <div class="ob-cards">
      <div class="ob-card">
        <div class="ob-card-icon">🗺</div>
        <div class="ob-card-title">Live Map</div>
        <div class="ob-card-desc">Interactive district scores updated every 2.5 seconds from live taxi positions</div>
      </div>
      <div class="ob-card">
        <div class="ob-card-icon">📊</div>
        <div class="ob-card-title">7-Day Heatmap</div>
        <div class="ob-card-desc">Forecast taxi demand across 7 time slots and 7 days of the week</div>
      </div>
      <div class="ob-card">
        <div class="ob-card-icon">🏡</div>
        <div class="ob-card-title">Postal Search</div>
        <div class="ob-card-desc">Enter any 6-digit Singapore postal code to check local transport access</div>
      </div>
    </div>
    <button class="ob-btn" onclick="window.app.goTo('dashboard')">Explore Dashboard</button>
    <div class="ob-note">Score = Bus×50% + Taxi×30% − Friction×20%</div>
  </div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const scr = state.screen;

  if (scr === 'onboarding') {
    app.innerHTML = renderOnboarding();
  } else if (scr === 'dashboard') {
    app.innerHTML = renderDashboard();
    requestAnimationFrame(() => {
      if (!_map) {
        initMap();
      } else {
        updateMapTile();
        DISTRICTS.forEach(d => refreshMarker(d.name));
        panToDistrict(state.district);
      }
      if (_map) _map.invalidateSize();
    });
  } else if (scr === 'deepdive') {
    app.innerHTML = renderDeepDive();
  } else if (scr === 'postal') {
    app.innerHTML = renderPostalResult();
  } else if (scr === 'cardlayout') {
    app.innerHTML = renderCardLayout();
  } else if (scr === 'glossary') {
    app.innerHTML = renderGlossary();
  }
}

// ─── WINDOW.APP HANDLERS ──────────────────────────────────────────────────────
window.app = {
  goTo(screen) {
    state.screen = screen;
    if (screen === 'dashboard') state.showWeightsModal = false;
    render();
    window.scrollTo(0, 0);
  },
  selectDistrict(name) {
    state.district = name;
    if (state.screen !== 'dashboard') {
      state.screen = 'dashboard';
    }
    render();
    if (_map && COORDS[name]) {
      setTimeout(() => _map && _map.panTo(COORDS[name], { animate: true, duration: 0.4 }), 50);
    }
  },
  setTab(tab) {
    state.tab = tab;
    render();
  },
  setTile(key) {
    state.tileKey = key;
    // Only update tile layer, re-render buttons
    updateMapTile();
    document.querySelectorAll('.msp-btn').forEach(btn => {
      const k = btn.getAttribute('onclick').match(/'(\w+)'/)[1];
      btn.classList.toggle('active', k === key);
    });
  },
  setDay(day) { state.day = day; render(); },
  setTime(time) { state.time = time; render(); },
  cycleAnomaly() { state.anomaly = (state.anomaly + 1) % 4; render(); },
  showWeights() { state.showWeightsModal = true; render(); },
  hideWeights() { state.showWeightsModal = false; render(); },
  setRadius(r) { state.postalRadius = r; render(); },
  updatePostalSearch(v) { state.postalSearch = v; },
  searchPostal() {
    const code = state.postalSearch.trim();
    if (POSTAL[code]) {
      state.postalCode = code;
      state.screen = 'postal';
      render();
    } else {
      const el = document.querySelector('.nav-search');
      if (el) {
        el.style.borderColor = '#ef4444';
        el.style.boxShadow = '0 0 0 2px rgba(239,68,68,.2)';
        setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 1500);
      }
    }
  },
  searchPostalCode(code) {
    state.postalCode = code;
    state.postalSearch = code;
    state.screen = 'postal';
    render();
  },
};

// ─── LIVE TICKER ──────────────────────────────────────────────────────────────
function tickTaxis() {
  DISTRICTS.forEach(d => {
    const delta = Math.round((Math.random() - 0.45) * 3);
    state.liveTaxis[d.name] = Math.max(0, Math.min(40, state.liveTaxis[d.name] + delta));
  });
  // Lightweight update — only patch DOM if on dashboard
  if (state.screen === 'dashboard') {
    const v = state.liveTaxis[state.district];
    const el1 = document.getElementById('card-taxis');
    const el2 = document.getElementById('metric-taxis');
    const el3 = document.getElementById('live-taxi-count');
    if (el1) el1.textContent = v;
    if (el2) el2.textContent = v;
    if (el3) el3.textContent = v;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  render();
  setInterval(tickTaxis, 2500);
});
</script>
</body>
</html>
